services:
  stt-nova2:
    build: .
    container_name: stt-nova2
    volumes:
      - .:/app
      - ./resource:/app/resource # Persist downloaded/generated files
      - ./queue_data:/app/queue_data
      - hf_cache:/root/.cache/huggingface # Cache models to host
      - tts_cache:/root/.local/share/tts # Cache TTS models
    ports:
      - "8123:8123"
    env_file:
      - .env
    environment:
      - STT_ENGINE=${STT_ENGINE:-phowhisper}
      - POSTGRESQL_HOST=${POSTGRESQL_HOST:-host.docker.internal}
      - POSTGRESQL_PORT=${POSTGRESQL_PORT:-5432}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE:-fusionpbx}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME:-fusionpbx}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD:-your_pg_password}
      - COQUI_TOS_AGREED=1
    extra_hosts:
      - "host.docker.internal:host-gateway" # Allow access to host services (DB)
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '6.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8123/" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hf_cache:
  tts_cache:
